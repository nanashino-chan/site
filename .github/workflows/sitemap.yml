name: sitemap

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: node generate-sitemap.js

      - run: |
          git config user.name "bot"
          git config user.email "bot@example.com"
          git add sitemap.xml
          git commit -m "update sitemap" || exit 0
          git push
