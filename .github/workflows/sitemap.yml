name: Generate Sitemap

on:
workflow_dispatch:

schedule:
- cron: "23 */6 * * *"

push:
branches:
- main
paths-ignore:
- "sitemap.xml"

permissions:
contents: write

concurrency:
group: sitemap-${{ github.ref }}
cancel-in-progress: true

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      ref: main
      persist-credentials: true

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: "18"

  - name: Generate sitemap
    run: node js/generate-sitemap.js

  - name: Check generated sitemap
    run: |
      ls -la
      test -f sitemap.xml

  - name: Commit sitemap
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"

      git add sitemap.xml

      if git diff --cached --quiet; then
        echo "No sitemap changes"
        exit 0
      fi

      git commit -m "auto: update sitemap"
      git push origin main
