<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today's Lo-Fi Track ☕ Study & Focus Music</title>

<meta name="description" content="Daily lo-fi music for study, focus, and relaxation. 作業用・勉強用BGMに最適な1曲。">

<link rel="stylesheet" href="style.css">

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<style>

/* ===== 全体 ===== */
body {
  margin: 0;
  background: #0f0f0f;
  color: #fff;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  text-align: center;
}

/* ===== コンテナ ===== */
.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

/* ===== プレイヤー ===== */
.player {
  position: relative;
  width: 100%;
  max-width: 720px;
  margin: 20px auto;
  cursor: pointer;
}

.player img {
  width: 100%;
  border-radius: 12px;
}

/* 再生ボタン */
.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 50%;
}
<!-- ===== プレイヤー ===== -->
<div id="player-container" class="player" onclick="initPlayer()">
  <img id="thumbnail" src="https://img.youtube.com/vi/PnyutlzXem0/hqdefault.jpg">
  <div class="play-btn">▶</div>
</div>

<!-- 🔥 ここに入れる -->
<section class="listen">

<h2>🎧 Listen & Save</h2>

<div class="dsp-buttons">

<a href="https://music.apple.com/us/artist/nanashino-chan/1795947895" target="_blank" class="apple">
🍎 Listen on Apple Music
</a>

<a href="https://music.youtube.com/channel/UCp5haCnpYEvkF5fVa0jeo2A" target="_blank" class="ytmusic">
▶ Listen on YouTube Music
</a>

</div>

</section>
  
/* ===== コントロール ===== */
.controls {
  margin: 20px;
}

.controls button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #1e1e1e;
  color: white;
  cursor: pointer;
}

.controls button:hover {
  background: #333;
}

/* ===== YouTube CTA ===== */
.youtube-btn {
  display: inline-block;
  margin-top: 30px;
  padding: 14px 24px;
  background: linear-gradient(135deg, #ff0000, #cc0000);
  color: white;
  text-decoration: none;
  border-radius: 10px;
  font-weight: bold;
  transition: 0.3s;
}

.youtube-btn:hover {
  transform: scale(1.05);
}

</section>



</style>

</head>

<body>

<div class="container">

<h1>🎧 Today's Lo-Fi Track</h1>
<p>今日の作業・勉強・リラックスに最適な1曲</p>

<!-- ===== プレイヤー ===== -->
<div id="player-container" class="player" onclick="initPlayer()">
  <img id="thumbnail" src="https://img.youtube.com/vi/PnyutlzXem0/hqdefault.jpg">
  <div class="play-btn">▶</div>
</div>

<!-- ===== コントロール ===== -->
<div class="controls">
  <button onclick="playVideo()">▶ Play</button>
  <button onclick="nextTrack()">⏭ Next</button>
</div>

<!-- ===== 説明 ===== -->
<p>
Perfect for study, deep focus, and relaxation.<br>
作業・勉強・集中・リラックスに最適なLo-Fi音楽。
</p>

<!-- ===== YouTube導線 ===== -->
<a id="youtubeLink"
   href="https://www.youtube.com/watch?v=PnyutlzXem0"
   target="_blank"
   class="youtube-btn">
🎧 Continue Listening on YouTube Playlist
</a>

</div>

<script>

/* ===== 動画リスト ===== */
const videos = [
  "PnyutlzXem0",
  "XPv78upJZhQ",
  "iRSTgLr4WVE",    
  "MBsx4sUtNxs",
  "GRGkJoQGMjs",
  "RL_lN7zBxE4",
  "Ftm2Ev4pV-c"
];

let player;
let currentIndex = 0;
let isPlayerReady = false;

/* ===== 初期化 ===== */
function initPlayer() {
  if (player) return;

  const container = document.getElementById("player-container");

  container.innerHTML = '<div id="player"></div>';

  player = new YT.Player("player", {
    height: "405",
    width: "720",
    videoId: videos[currentIndex],
    playerVars: {
      autoplay: 1,
      controls: 1
    },
    events: {
      onReady: () => {
        isPlayerReady = true;
      }
    }
  });

  updateYouTubeLink();
}

/* ===== 再生 ===== */
function playVideo() {
  if (!player) {
    initPlayer();
  } else if (isPlayerReady) {
    player.playVideo();
  }
}

/* ===== 次の曲 ===== */
function nextTrack() {
  currentIndex = (currentIndex + 1) % videos.length;

  if (!player) {
    initPlayer();
  } else {
    player.loadVideoById(videos[currentIndex]);
  }

  updateYouTubeLink();
}

/* ===== YouTubeリンク更新 ===== */
function updateYouTubeLink() {
  const link = document.getElementById("youtubeLink");
  link.href = "https://www.youtube.com/watch?v=" + videos[currentIndex];
}

</script>

</body>
</html>
