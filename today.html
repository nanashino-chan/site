<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today's Lo-Fi Track | Study & Chill Music</title>

<!-- SEO（最低限） -->
<meta name="description" content="Today's recommended lo-fi track for study, focus, and relaxation. 今日の作業・勉強に最適なLo-Fi音楽。">

<!-- CSP（簡易セキュリティ） -->
<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://www.youtube.com https://www.youtube.com/iframe_api;
frame-src https://www.youtube.com;
img-src 'self' https://img.youtube.com data:;
style-src 'self' 'unsafe-inline';
">

<style>
body{
    margin:0;
    background:#0e0e0e;
    color:#ffffff;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#bbbbbb;
    margin-bottom:20px;
}

/* ===== プレイヤー ===== */
.player{
  position:relative;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.player img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.play-btn{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:50%;
}

/* ===== ボタン ===== */
.controls{
  margin-top:20px;
}

.controls button{
  margin:10px;
  padding:12px 24px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

/* ===== YouTube導線 ===== */
.youtube-btn{
    display:inline-block;
    background:#ff4c4c;
    color:#ffffff;
    font-size:16px;
    font-weight:600;
    padding:16px 48px;
    border-radius:100px;
    text-decoration:none;
    margin-top:30px;
    transition:0.2s;
}

.youtube-btn:hover{
    transform:scale(1.05);
}

/* ===== リンク ===== */
.back-link{
    display:block;
    margin-top:40px;
    font-size:14px;
    color:#bdbdbd;
    text-decoration:none;
}

.back-link:hover{
    color:#ffffff;
}

/* ===== 実績 ===== */
.reel{
    margin-top:40px;
}

.reel img{
    width:100%;
    max-width:400px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>Today's Lo-Fi Track</h1>
<p>今日の作業・勉強・リラックスに最適な1曲</p>

<!-- ===== プレイヤー（軽量） ===== -->
<div class="player" id="player" onclick="playVideo()">
  <img id="thumbnail"
       src="https://img.youtube.com/vi/PnyutlzXem0/hqdefault.jpg"
       alt="Today's Lofi Track">
  <div class="play-btn">▶</div>
</div>

<!-- ===== コントロール ===== -->
<div class="controls">
  <button onclick="playVideo()">Play</button>
  <button onclick="nextTrack()">Next Track</button>
</div>

<!-- ===== SEOテキスト ===== -->
<p>
This lo-fi track is perfect for study, deep focus, and relaxation.<br>
このLo-Fi音楽は、作業・勉強・集中・リラックスに最適です。
</p>

<!-- ===== 実績 ===== -->
<div class="reel">
  <h2>Used by Creators</h2>
  <p>世界中のクリエイターに使用されています</p>
  <img src="https://via.placeholder.com/400x225" alt="Used in reels">
</div>

<!-- ===== YouTube導線 ===== -->
<a href="https://www.youtube.com/watch?v=PnyutlzXem0"
   target="_blank"
   class="youtube-btn">
Listen on YouTube
</a>

<!-- ===== 戻る ===== -->
<a href="index.html" class="back-link">
Back to Top
</a>

</div>

<script>
const videos = [
  "PnyutlzXem0",
  "XPv78upJZhQ",
  "iRSTgLr4WVE"
];

let current = 0;
let playerLoaded = false;

function playVideo(){
  if(playerLoaded) return;

  const el = document.getElementById("player");

  el.innerHTML = `
    <iframe
      src="https://www.youtube.com/embed/${videos[current]}?autoplay=1"
      frameborder="0"
      allow="autoplay"
      allowfullscreen>
    </iframe>
  `;

  playerLoaded = true;
}

function nextTrack(){
  current = Math.floor(Math.random() * videos.length);
  playerLoaded = false;
  playVideo();
}
</script>

</body>
</html>
