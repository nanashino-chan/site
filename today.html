<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Today's Lo-Fi Track ☕ Study & Focus Music</title>

<meta name="description" content="Daily lo-fi music for study, focus, and relaxation. 作業用・勉強用BGMに最適な1曲。">

<link rel="stylesheet" href="style.css">

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CLHM36E1P0"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-CLHM36E1P0');
</script>

<style>

/* ===== 全体 ===== */
body {
  margin: 0;
  background: #0f0f0f;
  color: #fff;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  text-align: center;
}

/* ===== コンテナ ===== */
.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

/* ===== プレイヤー ===== */
.player {
  position: relative;
  width: 100%;
  max-width: 720px;
  margin: 20px auto;
  cursor: pointer;
}

.player img {
  width: 100%;
  border-radius: 12px;
}

.play-btn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 48px;
  background: rgba(0,0,0,0.6);
  padding: 10px 20px;
  border-radius: 50%;
}

/* ===== CTA ===== */
.listen {
  display: none;
  margin-top: 30px;
}

.track-title {
  font-size: 18px;
  margin-top: 15px;
}

.album-title {
  font-size: 14px;
  color: #aaa;
}

.dsp-buttons {
  margin-top: 20px;
}

.dsp-buttons a {
  display: inline-block;
  width: 260px;
  padding: 12px;
  margin: 8px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
}

.apple {
  background: #000;
}

.ytmusic {
  background: #cc0000;
}

</style>
</head>

<body>

<div class="container">

<h1>🎧 Today's Lo-Fi Track</h1>
<p>今日の作業・勉強・リラックスに最適な1曲</p>

<!-- プレイヤー -->
<div id="player-container" class="player" onclick="initPlayer()">
  <img id="thumbnail" src="https://img.youtube.com/vi/PnyutlzXem0/hqdefault.jpg">
  <div class="play-btn">▶</div>
</div>

<!-- コントロール -->
<div class="controls">
  <button onclick="playVideo()">▶ Play</button>
  <button onclick="nextTrack()">⏭ Next</button>
</div>

<!-- 曲情報 -->
<p class="track-title"></p>
<p class="album-title"></p>

<!-- CTA -->
<section class="listen">
  <h2>🎧 Listen & Save</h2>

  <div class="dsp-buttons">
    <a class="apple" target="_blank">
      Save this track on Apple Music<br>
      この曲を今すぐ保存
    </a>

    <a href="https://music.youtube.com/channel/UCp5haCnpYEvkF5fVa0jeo2A"
       target="_blank"
       class="ytmusic">
      ▶ YouTube Music
    </a>
  </div>
</section>

<!-- YouTube導線 -->
<a id="youtubeLink"
   target="_blank"
   class="youtube-btn">
🎧 Continue on YouTube
</a>

</div>

<script>

/* ===== トラックデータ ===== */
const tracks = [
  {
    title: "Smooth Groove – Chill Lo-Fi Beat",
    videoId: "PnyutlzXem0",
    apple: "https://music.apple.com/us/album/smooth-groove-remastered-night-caf%C3%A9-single/1860873849",
    album: "Smooth Chillhop Jazz Beats"
  },
  {
    title: "Smooth Transitions – Chillhop Lo-Fi",
    videoId: "MBsx4sUtNxs",
    apple: "https://music.apple.com/us/album/chillhop-lo-fi-relax-focus-instrumental/1796933282",
    album: "Chillhop Lo-Fi Relax & Focus"
  },
  {
    title: "Stillness Vibes – Calm Lo-Fi",
    videoId: "GRGkJoQGMjs",
    apple: "https://music.apple.com/us/album/smooth-waves-timeless-electronica-lo-fi-grooves/1811585664",
    album: "Smooth Waves"
  },
  {
    title: "Calm Transitions – Study Lo-Fi",
    videoId: "RL_lN7zBxE4",
    apple: "https://music.apple.com/us/album/smooth-lo-fi-beats-study-chill/1806121136",
    album: "Smooth Lo-Fi Beats"
  },
  {
    title: "Sunset Glow – Cozy Lo-Fi",
    videoId: "Ftm2Ev4pV-c",
    apple: "https://music.apple.com/us/album/cozy-chillhop-nights-relaxing-lo-fi-beats-with-a/1805874023",
    album: "Cozy Chillhop Nights"
  }
];

let player;
let currentIndex = 0;

/* ===== 初期化 ===== */
function initPlayer() {
  if (player) return;

  const container = document.getElementById("player-container");
  container.innerHTML = '<div id="player"></div>';

  player = new YT.Player("player", {
    height: "405",
    width: "720",
    videoId: tracks[currentIndex].videoId,
    playerVars: { autoplay: 1 }
  });

  updateUI();
}

/* ===== 再生 ===== */
function playVideo() {
  if (!player) initPlayer();
  else player.playVideo();
}

/* ===== 次 ===== */
function nextTrack() {
  currentIndex = (currentIndex + 1) % tracks.length;
  player.loadVideoById(tracks[currentIndex].videoId);
  updateUI();
}

/* ===== UI更新 ===== */
function updateUI() {
  const track = tracks[currentIndex];

  // CTA表示（遅延）
  setTimeout(() => {
    document.querySelector(".listen").style.display = "block";
  }, 3000);

  // Appleリンク更新
  document.querySelector(".apple").href = track.apple;

  // テキスト
  document.querySelector(".track-title").textContent =
    "Now Playing: " + track.title;

  document.querySelector(".album-title").textContent =
    "Album: " + track.album + " (Find this track inside)";

  // YouTubeリンク
  document.getElementById("youtubeLink").href =
    "https://www.youtube.com/watch?v=" + track.videoId;

  // GAイベント
  document.querySelector(".apple").onclick = () => {
    gtag('event', 'click_apple', {
      event_category: 'dsp',
      event_label: track.title
    });
  };
}

/* 初回 */
window.onload = () => {
  updateUI();
};

</script>

</body>
</html>
