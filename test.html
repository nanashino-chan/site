<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lo-Fi Test Player</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

/* プレイヤー */
.player-wrapper {
  max-width: 800px;
  margin: 0 auto;
}

#main-player {
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
}

/* ボタン */
.genre-grid {
  margin-top: 20px;
}

button {
  margin: 5px;
  padding: 10px 16px;
  cursor: pointer;
}
</style>

</head>
<body>

<h1>Lo-Fi Player Test</h1>

<!-- プレイヤー -->
<div class="player-wrapper">
  <div id="main-player"></div>
</div>

<p id="nowPlaying">▶ Select a mood</p>

<!-- ジャンル -->
<div class="genre-grid">
  <button onclick="playGenre('focus')">Focus</button>
  <button onclick="playGenre('sleep')">Sleep</button>
  <button onclick="playGenre('tokyo')">Tokyo</button>
</div>

<!-- Next -->
<div>
  <button onclick="nextTrack()">Next Track</button>
</div>

<!-- データ -->
<script>
window.videos = {
  focus: ["O_DlB-RyU-4","jfKfPfyJRdk"],
  sleep: ["_5pVC_EikhU","DWcJFNfaw9c"],
  tokyo: ["rjK5Ql3BaaQ","5qap5aO4i9A"]
};
</script>

<!-- JS -->
<script>

// =========================
// 状態
// =========================
let player = null;
let currentGenre = null;

// =========================
// YouTube API
// =========================
function loadYouTubeAPI() {
  return new Promise((resolve) => {

    if (window.YT && window.YT.Player) {
      return resolve();
    }

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = resolve;
  });
}

// =========================
// ランダム
// =========================
function getRandomVideo(type) {
  const list = window.videos[type] || [];
  if (!list.length) return null;

  return list[Math.floor(Math.random() * list.length)];
}

// =========================
// 再生
// =========================
async function playGenre(type) {

  currentGenre = type;

  await loadYouTubeAPI();

  const videoId = getRandomVideo(type);
  if (!videoId) return;

  if (!player) {

    player = new YT.Player("main-player", {
      videoId,
      playerVars: {
        autoplay: 1,
        rel: 0,
        modestbranding: 1
      },
      events: {
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.ENDED) {
            nextTrack();
          }
        }
      }
    });

  } else {
    player.loadVideoById(videoId);
  }

  document.getElementById("nowPlaying").textContent =
    "▶ " + type.toUpperCase() + " Playing";
}

// =========================
// 次の曲
// =========================
function nextTrack() {
  if (!player || !currentGenre) return;

  const next = getRandomVideo(currentGenre);
  if (next) player.loadVideoById(next);
}

// =========================
// 初期サムネ（安全）
// =========================
window.addEventListener("DOMContentLoaded", () => {

  const el = document.getElementById("main-player");

  const first = window.videos.focus[0];
  const thumbnail = `https://img.youtube.com/vi/${first}/hqdefault.jpg`;

  el.style.backgroundImage = `url(${thumbnail})`;
  el.style.backgroundSize = "cover";
  el.style.cursor = "pointer";

  el.addEventListener("click", () => {
    playGenre("focus");
  });

});

</script>

</body>
</html>
